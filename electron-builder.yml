appId: com.zaraffasoft.ddevui
productName: DDevUI
directories:
  buildResources: build
files:
  - out/**
  - package.json
  # Runtime icons referenced by the main process for the dock + menu-bar tray.
  # The main bundle resolves these as app.asar/resources/icon*.png, so they must
  # be packed alongside out/ — without them Tray creation fails and startup dies.
  - resources/icon.png
  - resources/icon-light.png
# node-pty must live outside the asar archive: its spawn-helper is a real
# executable that cannot run from inside an archive. The tray/dock icons are
# unpacked too so nativeImage reads them as real files rather than asar entries.
asarUnpack:
  - '**/node_modules/node-pty/**'
  - resources/icon.png
  - resources/icon-light.png
artifactName: ${name}-${version}-${os}-${arch}.${ext}
# Ad-hoc sign the macOS bundle ourselves. Adding our Info.plist/icon/resources
# invalidates Electron's built-in linker signature; with no Developer ID to
# re-sign with, electron-builder skips signing and ships a broken signature that
# macOS reports as "damaged". This hook re-signs ad-hoc → valid (unnotarized).
afterPack: ./build/afterPack.cjs
publish:
  provider: github
mac:
  category: public.app-category.developer-tools
  darkModeSupport: true
  # dmg only — the zip target exists solely for electron-updater, which this app
  # doesn't use.
  target:
    - target: dmg
      arch: [arm64, x64]
win:
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: stripathi@zaraffasoft.com
npmRebuild: false
