name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build and publish
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple Developer ID: don't search the keychain for a real cert.
          # macOS signing is handled by `mac.identity: '-'` (ad-hoc) in
          # electron-builder.yml, which yields a valid (unnotarized) signature
          # so downloads aren't flagged "damaged".
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          pnpm exec electron-vite build
          if [ "$RUNNER_OS" == "macOS" ]; then
            pnpm exec electron-builder --mac --publish always
          elif [ "$RUNNER_OS" == "Windows" ]; then
            pnpm exec electron-builder --win --publish always
          else
            pnpm exec electron-builder --linux --publish always
          fi
