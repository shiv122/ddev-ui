name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build installers on each OS and stash them as workflow artifacts. No job
  # publishes here — that avoids the matrix race where parallel jobs each create
  # a GitHub release for the same tag (which produced a duplicate empty release).
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build installers
        shell: bash
        env:
          # No Apple Developer ID: don't search the keychain. macOS signing is
          # handled by the afterPack ad-hoc hook in electron-builder.yml.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          pnpm exec electron-vite build
          if [ "$RUNNER_OS" == "macOS" ]; then
            pnpm exec electron-builder --mac --publish never
          elif [ "$RUNNER_OS" == "Windows" ]; then
            pnpm exec electron-builder --win --publish never
          else
            pnpm exec electron-builder --linux --publish never
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          # Installers only — no .zip/.blockmap/latest*.yml (auto-update plumbing
          # this app doesn't use).
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

  # Single job creates exactly one release for the tag with all installers.
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
